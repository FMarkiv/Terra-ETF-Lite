name: daily-etf-flow

# Runs Tue–Sat 07:00 Australia/Sydney (= Mon–Fri 21:00 UTC). By that hour every
# US issuer has posted the previous US close overnight (AEST evening) and the ASX
# files are in — so each run captures the freshest holdings available. US trades
# Mon–Fri, so Sun/Mon AEST would have nothing new; we skip them.
on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Let the build commit the day's snapshots back, and publish to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never let two daily runs overlap.
concurrency:
  group: daily-etf-flow
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build (scrape -> deltas -> static site)
        run: python -m etf_lite.build

      - name: Send Telegram alert (17 auto-scraped funds)
        # Sends only if the secrets are set; otherwise notify.py logs a preview
        # and exits 0 (so an unconfigured bot never fails the run).
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify.py

      - name: Commit updated snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots
          if git diff --cached --quiet; then
            echo "No new snapshots to commit."
          else
            git commit -m "data: holdings snapshots $(date -u +%Y-%m-%d)"
            # Retry against a moving remote: another push (a manual commit or an
            # overlapping run) can land between our checkout and push, which
            # rejects a plain `git push` (fetch first). Rebase onto the latest
            # origin/main and retry — our change only touches data/snapshots, so
            # it rebases cleanly on top of unrelated commits.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "pushed on attempt $attempt"; break
              fi
              echo "push rejected (attempt $attempt) — rebasing onto origin/main"
              git fetch origin main
              git rebase origin/main || { git rebase --abort; echo "rebase conflict"; exit 1; }
              if [ "$attempt" -eq 5 ]; then echo "push failed after 5 attempts"; exit 1; fi
              sleep 3
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
