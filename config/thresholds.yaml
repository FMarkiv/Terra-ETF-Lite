# Controls what surfaces as a "material" change in the dashboard.
# Additions/removals always surface; weight/share changes are filtered here.

defaults:
  min_weight_delta_bps: 25        # 0.25% absolute weight change
  min_share_pct_change: 5.0       # 5% change in shares held
  min_value_delta_usd: 1000000    # $1M absolute value change

overrides_by_vertical:
  gold:
    min_weight_delta_bps: 30      # GDX has 50+ holdings, wider band
  copper:
    min_weight_delta_bps: 20      # COPX has ~30 holdings, tighter

cross_etf:
  min_converging_etfs: 2          # At least 2 ETFs moving same direction
  # Cross-listings of the SAME fund/index are one underlying portfolio, so they
  # must count as ONE converging vote — not several. Each list below collapses
  # to a single vote per ISIN (representative = first ticker present). Funds not
  # listed here stay independent (RING, SIL, URNM, URA, etc. are different
  # indices and must NOT be grouped). The .L tickers are absent from the lite
  # universe but harmless to list.
  equivalent_etf_groups:
    - ["GDX", "GDX.L", "GDX-ASX"]   # VanEck Gold Miners (NYSE Arca Gold Miners Index)
    - ["GDXJ", "GDXJ.L"]            # VanEck Junior Gold Miners (MVIS Junior)
    - ["COPX", "4COP"]              # Global X Copper Miners (Solactive)

additions_removals:
  always_surface: true
